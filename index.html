 <!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casa por Temporada - Nova Guarapari</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ============================================================
           RESET E CONFIGURAÇÕES GERAIS
           ============================================================ */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --azul-oceano: #0a4a5e;
            --azul-petroleo: #1a2f3a;
            --dourado: #d4af37;
            --dourado-suave: #f0e2b5;
            --branco: #ffffff;
            --cinza-claro: #f5f7fa;
            --cinza-texto: #4a5a6a;
            --glass: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.18);
            --sombra: 0 20px 60px rgba(0, 0, 0, 0.12);
            --sombra-suave: 0 8px 32px rgba(0, 0, 0, 0.06);
            --raio: 20px;
            --transicao: 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--branco);
            color: var(--azul-petroleo);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* ============================================================
           SCROLLBAR PERSONALIZADA
           ============================================================ */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--cinza-claro);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--azul-oceano);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--dourado);
        }

        /* ============================================================
           TELA DE CARREGAMENTO CINEMATOGRÁFICA
           ============================================================ */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10000;
            background: var(--azul-petroleo);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: opacity 1.2s ease, visibility 1.2s ease;
        }

        #loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* Onda realista */
        .wave-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg,
                    rgba(10, 74, 94, 0.92) 0%,
                    rgba(10, 74, 94, 0.88) 30%,
                    rgba(13, 106, 134, 0.85) 60%,
                    rgba(30, 150, 180, 0.75) 85%,
                    rgba(60, 190, 220, 0.5) 100%);
            overflow: hidden;
        }

        .wave-bg svg {
            position: absolute;
            bottom: -5%;
            left: 0;
            width: 100%;
            height: 70%;
            animation: waveFloat 8s ease-in-out infinite alternate;
        }

        .wave-bg svg:nth-child(2) {
            bottom: -8%;
            opacity: 0.5;
            animation-duration: 10s;
            animation-delay: -2s;
        }

        .wave-bg svg:nth-child(3) {
            bottom: -12%;
            opacity: 0.3;
            animation-duration: 12s;
            animation-delay: -4s;
        }

        @keyframes waveFloat {
            0% {
                transform: translateX(-2%) scaleY(1);
            }
            100% {
                transform: translateX(2%) scaleY(1.08);
            }
        }

        /* Conteúdo da tela de loading */
        .loading-content {
            position: relative;
            z-index: 2;
            text-align: center;
            animation: loadingPulse 2.4s ease-in-out infinite;
        }

        .loading-content .subtitle {
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            font-size: 0.9rem;
            letter-spacing: 8px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .loading-content h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3.5rem, 12vw, 7rem);
            font-weight: 700;
            font-style: italic;
            color: var(--branco);
            line-height: 0.95;
            text-shadow: 0 8px 40px rgba(0, 0, 0, 0.25);
            letter-spacing: 4px;
        }

        .loading-content h1 span {
            color: var(--dourado);
            font-weight: 400;
        }

        .loading-content .loading-bar {
            width: 200px;
            height: 2px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
            margin: 30px auto 0;
            overflow: hidden;
        }

        .loading-content .loading-bar::after {
            content: '';
            display: block;
            width: 40%;
            height: 100%;
            background: var(--dourado);
            border-radius: 4px;
            animation: loadingProgress 2.8s ease-in-out infinite;
        }

        @keyframes loadingPulse {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.92;
                transform: scale(1.01);
            }
        }

        @keyframes loadingProgress {
            0% {
                transform: translateX(-100%);
            }
            100% {
                transform: translateX(350%);
            }
        }

        /* Partículas de água */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            animation: particleFloat linear infinite;
        }

        .particle:nth-child(1) {
            left: 10%;
            animation-duration: 7s;
            animation-delay: 0s;
            width: 4px;
            height: 4px;
        }
        .particle:nth-child(2) {
            left: 25%;
            animation-duration: 9s;
            animation-delay: 1s;
            width: 8px;
            height: 8px;
        }
        .particle:nth-child(3) {
            left: 40%;
            animation-duration: 6s;
            animation-delay: 0.5s;
            width: 3px;
            height: 3px;
        }
        .particle:nth-child(4) {
            left: 55%;
            animation-duration: 11s;
            animation-delay: 2s;
            width: 10px;
            height: 10px;
            opacity: 0.08;
        }
        .particle:nth-child(5) {
            left: 70%;
            animation-duration: 8s;
            animation-delay: 0.3s;
            width: 5px;
            height: 5px;
        }
        .particle:nth-child(6) {
            left: 85%;
            animation-duration: 10s;
            animation-delay: 1.5s;
            width: 7px;
            height: 7px;
        }
        .particle:nth-child(7) {
            left: 15%;
            animation-duration: 12s;
            animation-delay: 0.8s;
            width: 9px;
            height: 9px;
            opacity: 0.06;
        }
        .particle:nth-child(8) {
            left: 50%;
            animation-duration: 7.5s;
            animation-delay: 1.2s;
            width: 4px;
            height: 4px;
        }
        .particle:nth-child(9) {
            left: 75%;
            animation-duration: 9.5s;
            animation-delay: 0.2s;
            width: 6px;
            height: 6px;
        }
        .particle:nth-child(10) {
            left: 92%;
            animation-duration: 8.5s;
            animation-delay: 1.8s;
            width: 5px;
            height: 5px;
        }

        @keyframes particleFloat {
            0% {
                transform: translateY(100vh) rotate(0deg) scale(0);
                opacity: 0;
            }
            20% {
                opacity: 0.6;
                transform: translateY(70vh) rotate(180deg) scale(1);
            }
            80% {
                opacity: 0.4;
            }
            100% {
                transform: translateY(-10vh) rotate(720deg) scale(0.5);
                opacity: 0;
            }
        }

        /* ============================================================
           CONTEÚDO PRINCIPAL
           ============================================================ */
        #main-content {
            opacity: 0;
            transition: opacity 1.4s ease;
        }

        #main-content.visible {
            opacity: 1;
        }

        /* ============================================================
           HEADER / HERO
           ============================================================ */
        .hero {
            position: relative;
            width: 100%;
            height: 100vh;
            min-height: 700px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: var(--azul-petroleo);
        }

        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        /* Overlay gradiente no hero */
        .hero::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg,
                    rgba(10, 74, 94, 0.3) 0%,
                    rgba(10, 74, 94, 0.1) 40%,
                    rgba(10, 74, 94, 0.5) 80%,
                    rgba(10, 74, 94, 0.8) 100%);
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            max-width: 900px;
            padding: 0 30px;
            animation: heroFadeIn 1.8s ease 0.5s both;
        }

        @keyframes heroFadeIn {
            0% {
                opacity: 0;
                transform: translateY(40px) scale(0.98);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .hero-content .badge {
            display: inline-block;
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 8px 28px;
            border-radius: 50px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 30px;
            animation: badgePulse 3s ease-in-out infinite;
        }

        @keyframes badgePulse {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.2);
            }
            50% {
                box-shadow: 0 0 0 12px rgba(212, 175, 55, 0);
            }
        }

        .hero-content h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3.2rem, 10vw, 6.5rem);
            font-weight: 700;
            font-style: italic;
            color: var(--branco);
            line-height: 1;
            text-shadow: 0 4px 40px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
        }

        .hero-content h1 span {
            color: var(--dourado);
            font-weight: 400;
        }

        .hero-content p {
            font-size: clamp(1.1rem, 2vw, 1.4rem);
            color: rgba(255, 255, 255, 0.85);
            font-weight: 300;
            letter-spacing: 1px;
            max-width: 600px;
            margin: 0 auto 40px;
        }

        .hero-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 40px;
            border: none;
            border-radius: 50px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transicao);
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: var(--dourado);
            color: var(--azul-petroleo);
            box-shadow: 0 8px 32px rgba(212, 175, 55, 0.35);
        }

        .btn-primary:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 48px rgba(212, 175, 55, 0.5);
        }

        .btn-secondary {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            color: var(--branco);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.15);
        }

        .btn-whatsapp {
            background: #25d366;
            color: var(--branco);
            box-shadow: 0 8px 32px rgba(37, 211, 102, 0.35);
        }

        .btn-whatsapp:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 48px rgba(37, 211, 102, 0.5);
        }

        /* ============================================================
           MENU DE NAVEGAÇÃO
           ============================================================ */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transicao);
            background: transparent;
        }

        .navbar.scrolled {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.06);
            padding: 14px 40px;
        }

        .navbar .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 700;
            font-style: italic;
            color: var(--branco);
            text-decoration: none;
            transition: var(--transicao);
            letter-spacing: 2px;
        }

        .navbar.scrolled .logo {
            color: var(--azul-petroleo);
        }

        .navbar .logo span {
            color: var(--dourado);
        }

        .nav-links {
            display: flex;
            gap: 32px;
            list-style: none;
            align-items: center;
        }

        .nav-links a {
            color: rgba(255, 255, 255, 0.85);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: var(--transicao);
            position: relative;
            letter-spacing: 0.5px;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--dourado);
            transition: var(--transicao);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .navbar.scrolled .nav-links a {
            color: var(--azul-petroleo);
        }

        .nav-links a:hover {
            color: var(--dourado);
        }

        .nav-links .btn-nav {
            background: var(--dourado);
            color: var(--azul-petroleo) !important;
            padding: 10px 28px;
            border-radius: 50px;
            font-weight: 600;
        }

        .nav-links .btn-nav::after {
            display: none;
        }

        .nav-links .btn-nav:hover {
            background: var(--dourado-suave);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(212, 175, 55, 0.3);
        }

        /* Menu mobile */
        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 5px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            z-index: 1001;
        }

        .menu-toggle span {
            display: block;
            width: 28px;
            height: 2px;
            background: var(--branco);
            transition: var(--transicao);
            border-radius: 4px;
        }

        .navbar.scrolled .menu-toggle span {
            background: var(--azul-petroleo);
        }

        .menu-toggle.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }
        .menu-toggle.active span:nth-child(2) {
            opacity: 0;
        }
        .menu-toggle.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }

        /* ============================================================
           SEÇÕES GERAIS
           ============================================================ */
        .section {
            padding: 100px 40px;
            max-width: 1280px;
            margin: 0 auto;
        }

        .section-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .section-header .tag {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--dourado);
            background: rgba(212, 175, 55, 0.1);
            padding: 6px 20px;
            border-radius: 50px;
            margin-bottom: 16px;
        }

        .section-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.4rem, 5vw, 3.8rem);
            font-weight: 700;
            color: var(--azul-petroleo);
            line-height: 1.1;
        }

        .section-header h2 span {
            color: var(--dourado);
        }

        .section-header p {
            color: var(--cinza-texto);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 16px auto 0;
            font-weight: 300;
        }

        /* ============================================================
           SEÇÃO SOBRE
           ============================================================ */
        #sobre {
            padding-top: 120px;
        }

        .sobre-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
        }

        .sobre-imagem {
            position: relative;
            border-radius: var(--raio);
            overflow: hidden;
            box-shadow: var(--sombra);
        }

        .sobre-imagem img {
            width: 100%;
            height: 500px;
            object-fit: cover;
            display: block;
            transition: var(--transicao);
        }

        .sobre-imagem:hover img {
            transform: scale(1.03);
        }

        .sobre-imagem .badge-img {
            position: absolute;
            bottom: 24px;
            left: 24px;
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px 28px;
            color: var(--branco);
        }

        .sobre-imagem .badge-img strong {
            display: block;
            font-size: 1.8rem;
            font-weight: 700;
            font-family: 'Playfair Display', serif;
        }

        .sobre-imagem .badge-img span {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .sobre-texto h3 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: var(--azul-petroleo);
            margin-bottom: 20px;
        }

        .sobre-texto h3 span {
            color: var(--dourado);
        }

        .sobre-texto p {
            color: var(--cinza-texto);
            font-size: 1.05rem;
            line-height: 1.8;
            margin-bottom: 24px;
        }

        .sobre-features {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .sobre-features .feature {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: var(--cinza-claro);
            border-radius: 12px;
            font-weight: 500;
            font-size: 0.95rem;
            transition: var(--transicao);
        }

        .sobre-features .feature:hover {
            background: rgba(212, 175, 55, 0.08);
            transform: translateX(4px);
        }

        .sobre-features .feature .icon {
            font-size: 1.3rem;
            width: 32px;
            text-align: center;
        }

        /* ============================================================
           SEÇÃO COMODIDADES
           ============================================================ */
        #comodidades {
            background: var(--cinza-claro);
            padding: 100px 40px;
        }

        #comodidades .section {
            padding: 0;
            max-width: 1280px;
            margin: 0 auto;
        }

        .comodidades-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 24px;
        }

        .comodidade-card {
            background: var(--branco);
            padding: 32px 24px;
            border-radius: var(--raio);
            text-align: center;
            box-shadow: var(--sombra-suave);
            transition: var(--transicao);
            border: 1px solid rgba(0, 0, 0, 0.03);
            cursor: default;
        }

        .comodidade-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--sombra);
            border-color: var(--dourado);
        }

        .comodidade-card .icon {
            font-size: 2.8rem;
            margin-bottom: 16px;
            display: block;
            transition: var(--transicao);
        }

        .comodidade-card:hover .icon {
            transform: scale(1.15) rotate(-4deg);
        }

        .comodidade-card h4 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--azul-petroleo);
        }

        .comodidade-card p {
            font-size: 0.85rem;
            color: var(--cinza-texto);
            margin-top: 4px;
        }

        /* ============================================================
           SEÇÃO GALERIA
           ============================================================ */
        #galeria {
            padding: 100px 40px;
        }

        #galeria .section {
            padding: 0;
            max-width: 1280px;
            margin: 0 auto;
        }

        .galeria-mosaico {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: 240px;
            gap: 16px;
        }

        .galeria-mosaico .item {
            border-radius: var(--raio);
            overflow: hidden;
            cursor: pointer;
            position: relative;
            box-shadow: var(--sombra-suave);
            transition: var(--transicao);
        }

        .galeria-mosaico .item:hover {
            transform: scale(1.02);
            box-shadow: var(--sombra);
            z-index: 2;
        }

        .galeria-mosaico .item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transicao);
        }

        .galeria-mosaico .item:hover img {
            transform: scale(1.08);
        }

        .galeria-mosaico .item:nth-child(1) {
            grid-column: span 2;
            grid-row: span 2;
        }
        .galeria-mosaico .item:nth-child(2) {
            grid-column: span 1;
            grid-row: span 1;
        }
        .galeria-mosaico .item:nth-child(3) {
            grid-column: span 1;
            grid-row: span 1;
        }
        .galeria-mosaico .item:nth-child(4) {
            grid-column: span 2;
            grid-row: span 1;
        }
        .galeria-mosaico .item:nth-child(5) {
            grid-column: span 1;
            grid-row: span 1;
        }
        .galeria-mosaico .item:nth-child(6) {
            grid-column: span 1;
            grid-row: span 1;
        }
        .galeria-mosaico .item:nth-child(7) {
            grid-column: span 2;
            grid-row: span 1;
        }
        .galeria-mosaico .item:nth-child(8) {
            grid-column: span 1;
            grid-row: span 1;
        }
        .galeria-mosaico .item:nth-child(9) {
            grid-column: span 1;
            grid-row: span 1;
        }

        .galeria-mosaico .item .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, transparent 60%, rgba(10, 74, 94, 0.6));
            display: flex;
            align-items: flex-end;
            padding: 20px;
            opacity: 0;
            transition: var(--transicao);
        }

        .galeria-mosaico .item:hover .overlay {
            opacity: 1;
        }

        .galeria-mosaico .item .overlay span {
            color: var(--branco);
            font-weight: 500;
            font-size: 0.9rem;
            background: var(--glass);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 6px 18px;
            border-radius: 50px;
            border: 1px solid var(--glass-border);
        }

        /* ============================================================
           LIGHTBOX DA GALERIA
           ============================================================ */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: var(--transicao);
            padding: 40px;
        }

        .lightbox.open {
            opacity: 1;
            visibility: visible;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 85%;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
            transform: scale(0.9);
            transition: var(--transicao);
        }

        .lightbox.open img {
            transform: scale(1);
        }

        .lightbox .close {
            position: absolute;
            top: 30px;
            right: 40px;
            font-size: 2.8rem;
            color: var(--branco);
            cursor: pointer;
            background: none;
            border: none;
            transition: var(--transicao);
            opacity: 0.7;
        }

        .lightbox .close:hover {
            opacity: 1;
            transform: rotate(90deg);
        }

        .contato-card {
            background: var(--cinza-claro);

        }
